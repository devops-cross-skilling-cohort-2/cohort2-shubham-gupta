name: Python Cohort2 App CD Pipeline

on:
  workflow_run:
    workflows: ["Python Cohort2 App CI Pipeline"]
    branches: [main]
    types:
      - completed

  workflow_dispatch:

env:
  APP_VERSION: 1.0.0
  APP_ENVIRONMENT: ci
  APP_PORT: 5050

jobs:
  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/cohort2-app:latest
            ${{ vars.DOCKERHUB_USERNAME }}/cohort2-app:${{ github.sha }}
            ${{ github.ref_type == 'tag' && format('{0}/cohort2-app:{1}', vars.DOCKERHUB_USERNAME, github.ref_name) || '' }}

  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: docker-build-push
    permissions:
      security-events: write

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ vars.DOCKERHUB_USERNAME }}/cohort2-app:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Run Trivy SARIF Report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ vars.DOCKERHUB_USERNAME }}/cohort2-app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy Results to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  verify-image:
    name: Verify Image on Fresh Runner
    runs-on: ubuntu-latest
    needs: [docker-build-push, trivy-scan]

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Image by Commit SHA
        run: |
          echo "Pulling image ${{ vars.DOCKERHUB_USERNAME }}/cohort2-app:${{ github.sha }}..."
          docker pull ${{ vars.DOCKERHUB_USERNAME }}/cohort2-app:${{ github.sha }}
          echo "Image pulled successfully."

      - name: Run Container
        run: |
          echo "Starting container..."
          docker run -d \
            --name app-under-test \
            -p 5050:5050 \
            -e APP_VERSION=${{ env.APP_VERSION }} \
            -e APP_ENVIRONMENT=${{ env.APP_ENVIRONMENT }} \
            -e APP_PORT=${{ env.APP_PORT }} \
            ${{ vars.DOCKERHUB_USERNAME }}/cohort2-app:${{ github.sha }}
          echo "Container started."

      - name: Wait for Application Startup
        run: |
          echo "Polling http://localhost:5050/health ..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5050/health; then
              echo "App is ready after $i attempt(s)."
              exit 0
            fi
            echo "Attempt $i/15 — not ready, sleeping 2s"
            sleep 2
          done
          echo "ERROR: App did not become ready within 30s."
          docker logs app-under-test
          exit 1

      - name: Verify Health Endpoint Returns HTTP 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5050/health)
          echo "Health endpoint returned: $STATUS"
          [ "$STATUS" = "200" ] || { docker logs app-under-test; exit 1; }

      - name: Print Container Logs
        if: always()
        run: |
          echo "Printing container logs..."
          docker logs app-under-test || true

      - name: Stop and Remove Container
        if: always()
        run: |
          echo "Cleaning up..."
          docker stop app-under-test || true
          docker rm   app-under-test || true
          docker rmi  ${{ vars.DOCKERHUB_USERNAME }}/cohort2-app:${{ github.sha }} || true
          echo "Cleanup complete."