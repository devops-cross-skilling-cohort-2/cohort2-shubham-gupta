name: K8s Prod Deploy

on:
  workflow_run:
    workflows: ["Python Cohort2 App CD Pipeline"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy to prod (e.g. v1.0.0 or a git SHA for rollback)'
        required: true
        type: string

jobs:
  k8s-prod-apply:
    name: Deploy to Prod
    runs-on: [self-hosted, self-hosted-local]
    environment: prod
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Resolve Image Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Cluster Connectivity
        run: kubectl cluster-info --context k3d-cohort-local

      - name: Deploy to Prod with Helm
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.value }}"
          helm upgrade --install cohort2-app-prod ./helm/cohort2-app \
            -f helm/cohort2-app/values-prod.yaml \
            --set image.tag=${IMAGE_TAG} \
            --set secret.appSecretKey="${{ secrets.APP_SECRET_KEY_PROD }}" \
            --namespace cohort-prod \
            --create-namespace \
            --atomic \
            --timeout 3m

      - name: Verify Pods are Ready
        run: kubectl get pods -n cohort-prod

      - name: Verify Service Endpoint
        run: |
          kubectl port-forward svc/cohort2-app-prod-svc 9092:80 \
            -n cohort-prod &
          PF_PID=$!
          echo "Waiting for port-forward to be ready..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9092/health; then
              echo "Health check passed."
              kill $PF_PID
              exit 0
            fi
            echo "Attempt $i/15 — not ready, retrying in 2s"
            sleep 2
          done
          echo "ERROR: Health check failed after 30s"
          kill $PF_PID
          exit 1
