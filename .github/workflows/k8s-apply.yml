name: K8s Dev Deploy

on:
  workflow_run:
    workflows: ["Python Cohort2 App CD Pipeline"]
    branches: [main]
    types:
      - completed

  workflow_dispatch:

jobs:
  k8s-dev-apply:
    name: Deploy to Dev
    runs-on: [self-hosted, self-hosted-local]
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Verify Cluster Connectivity
        run: kubectl cluster-info --context k3d-cohort-local

      - name: Deploy to Dev with Helm
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          helm upgrade --install cohort2-app-dev ./helm/cohort2-app \
            -f helm/cohort2-app/values-dev.yaml \
            --set image.tag=${IMAGE_TAG} \
            --set secret.appSecretKey="${{ secrets.APP_SECRET_KEY }}" \
            --namespace cohort-dev \
            --create-namespace \
            --atomic \
            --timeout 2m

      - name: Verify Pods are Ready
        run: kubectl get pods -n cohort-dev

      - name: Verify Service Endpoint
        run: |
          kubectl port-forward svc/cohort2-app-dev-svc 9091:80 \
            -n cohort-dev &
          PF_PID=$!
          echo "Waiting for port-forward to be ready..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9091/health; then
              echo "Health check passed."
              kill $PF_PID
              exit 0
            fi
            echo "Attempt $i/15 — not ready, retrying in 2s"
            sleep 2
          done
          echo "ERROR: Health check failed after 30s"
          kill $PF_PID
          exit 1
