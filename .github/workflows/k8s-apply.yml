name: K8s Dev Deploy

on:
  workflow_run:
    workflows: ["Python Cohort2 App CD Pipeline"]
    branches: [main]
    types:
      - completed

  workflow_dispatch:

jobs:
  k8s-dev-apply:
    name: Deploy to Dev
    runs-on: [self-hosted, self-hosted-local]
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Verify Cluster Connectivity
        run: kubectl cluster-info --context k3d-cohort-local

      - name: Apply Namespace
        run: kubectl apply -f k8s/dev/namespace.yaml

      - name: Apply ConfigMap
        run: kubectl apply -f k8s/dev/configmap.yaml

      - name: Create Secret from GitHub Secrets
        run: |
          kubectl create secret generic cohort2-app-secret \
            --from-literal=APP_SECRET_KEY="${{ secrets.APP_SECRET_KEY }}" \
            --namespace=cohort-dev \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Pin Image to Commit SHA
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          sed -i "s|${{ vars.DOCKERHUB_USERNAME }}/cohort2-app:latest|${{ vars.DOCKERHUB_USERNAME }}/cohort2-app:${IMAGE_TAG}|g" k8s/dev/deployment.yaml
          echo "Image pinned to: ${IMAGE_TAG}"

      - name: Apply Deployment and Service
        run: |
          kubectl apply -f k8s/dev/deployment.yaml
          kubectl apply -f k8s/dev/service.yaml

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/cohort2-app \
            -n cohort-dev \
            --timeout=120s

      - name: Verify Pods are Ready
        run: kubectl get pods -n cohort-dev

      - name: Verify Service Endpoint
        run: |
          kubectl port-forward svc/cohort2-app-svc 9091:80 \
            -n cohort-dev &
          sleep 5
          curl --fail http://localhost:9091/health
          kill %1
