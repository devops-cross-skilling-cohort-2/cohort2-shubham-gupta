name: Flask CI Pipeline

on:
  push:
    branches:
      - "**"

env:
  APP_VERSION: 1.0.0
  APP_ENVIRONMENT: ci
  APP_PORT: 5050      

jobs:
  lint-validation:
    name: Lint Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
      
      - name: Show Installed Packages
        run: |
          pip list

      - name: Run Flake8 Lint Validation
        run: |
          flake8 src tests \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint-validation

    steps:
        - name: Checkout Repository
          uses: actions/checkout@v6

        - name: Setup Python 3.10
          uses: actions/setup-python@v6
          with:
            python-version: "3.10"

        - name: Install Dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
        
        - name: Run Unit Tests
          run: |
            python -m unittest discover tests -v
            echo "Unit tests completed successfully."

  health-check:
    name: Application Health Check
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask Application
        run: |
          nohup python src/app.py > app.log 2>&1 &

      - name: Wait for Application Startup
        run: |
          sleep 5

      - name: Verify Application is Running
        run: |
          curl --fail --verbose http://127.0.0.1:5050/health

      - name: Print Application Logs
        if: always()
        run: |
          cat app.log || true