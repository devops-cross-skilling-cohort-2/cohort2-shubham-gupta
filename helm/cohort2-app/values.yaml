# Image
image:
  repository: shguptaee/cohort2-app
  tag: latest          # always overridden by --set image.tag= in the pipeline
  pullPolicy: Always

# Replicas — overridden per environment in values-dev/prod.yaml
replicaCount: 2

# Namespace — overridden per environment
namespace: cohort-dev

# Service
service:
  port: 80
  targetPort: 5050

# App config (becomes a ConfigMap)
config:
  APP_VERSION: "1.0.0"
  APP_PORT: "5050"
  APP_ENVIRONMENT: "dev" 

# Secret (value injected via --set at deploy time, never stored here)
secret:
  appSecretKey: ""

# Resource requests and limits
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

# Probes
readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 3

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3
  timeoutSeconds: 3