apiVersion: v1
kind: Service
metadata:
  name: {{ include "cohort2-app.fullname" . }}-svc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cohort2-app.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "cohort2-app.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  type: ClusterIP